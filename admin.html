<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Reporte de consultas cct mas vistas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <section class="hero">

            <div class="hero-card">

                <div class="encabezado">

                    <h1>Panel de monitoreo</h1>

                    <p class="descripcion">

                    </p>

                </div>

                <div class="monitor admin-panel">

                    <button id="btnExportReport" class="btn-monitor">

                    </button>

                    <div id="monitorResultado" class="monitor-resultado"></div>

                </div>

            </div>

        </section>

    </main>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="admin.js"></script>
