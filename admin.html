<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Reporte de consultas cct mas vistas</title>

    <link rel="stylesheet" href="/style.css">

</head>

<body>

    <main>

        <section class="hero">

            <div class="hero-card">

                <div class="encabezado">

                    <div class="brand-row brand-row--center">
                        <picture>
                            <source srcset="/assets/gobierno-mexico.png" type="image/png">
                            <img src="/assets/gobierno-mexico.svg" alt="Gobierno de México" class="brand-logo brand-logo--wide">
                        </picture>
                        <picture>
                            <source srcset="/assets/becas-bienestar.png" type="image/png">
                            <img src="/assets/becas-bienestar.svg" alt="Becas Bienestar" class="brand-logo brand-logo--wide">
                        </picture>
                    </div>

                    <h1>Panel de monitoreo</h1>

                    <p class="descripcion">
                        Inicia sesión con la contraseña para ver y exportar el reporte.
                    </p>

                </div>

                <div class="monitor admin-panel">

                    <!-- Static fallback login form (visible if JS doesn't run) -->
                    <div class="login-form" id="staticLogin">
                        <h2>Acceso al Panel de Administración</h2>
                        <input 
                            type="password" 
                            id="passwordInput" 
                            placeholder="Ingresa la contraseña" 
                            autocomplete="off"
                        />
                        <button id="btnLogin" class="btn-monitor">Ingresar</button>
                        <div id="loginError" style="color: #dc3545; margin-top: 12px; display: none;"></div>
                    </div>

                    <button id="btnExportReport" class="btn-monitor hidden">
                        Exportar reporte de consultas
                    </button>

                    <div id="monitorResultado" class="monitor-resultado"></div>

                </div>

            </div>

        </section>

    </main>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="/admin.js"></script>

</body>

</html>
